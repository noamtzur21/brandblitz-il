<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="0.6" stop-color="#0a0f1b"/>
      <stop offset="1" stop-color="#0c0610"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="35%" r="80%">
      <stop offset="0" stop-color="#ff3df2" stop-opacity="0.22"/>
      <stop offset="0.42" stop-color="#7c5cff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Timeline bars -->
  <g opacity="0.55" filter="url(#soft)">
    <rect x="150" y="180" width="1080" height="16" rx="8" fill="rgba(0,245,255,0.28)"/>
    <rect x="150" y="230" width="860" height="16" rx="8" fill="rgba(255,61,242,0.22)"/>
    <rect x="150" y="280" width="990" height="16" rx="8" fill="rgba(124,92,255,0.22)"/>
    <rect x="150" y="330" width="740" height="16" rx="8" fill="rgba(233,238,252,0.16)"/>
  </g>

  <!-- Play mark -->
  <g transform="translate(1240 300)">
    <rect x="0" y="0" width="240" height="240" rx="44" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <path d="M95 72l86 48-86 48V72z" fill="rgba(0,245,255,0.9)"/>
    <path d="M95 72l86 48-86 48V72z" fill="none" stroke="rgba(255,61,242,0.55)" stroke-width="3" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="110" y="560" fill="#e9eefc" font-size="96" font-weight="800" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Remotion
  </text>
  <text x="110" y="632" fill="rgba(233,238,252,0.62)" font-size="34" font-weight="600" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Templates · motion · typography
  </text>

  <!-- Frame -->
  <rect x="44" y="44" width="1512" height="812" rx="34" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
</svg>
