<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="0.55" stop-color="#0c0a18"/>
      <stop offset="1" stop-color="#060a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="40%" r="85%">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#7c5cff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff3df2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#7c5cff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff3df2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Camera body -->
  <g transform="translate(1020 230)" filter="url(#shadow)">
    <rect x="0" y="70" width="470" height="300" rx="54" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <rect x="70" y="0" width="210" height="130" rx="40" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <circle cx="240" cy="220" r="118" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <circle cx="240" cy="220" r="92" fill="url(#lens)" opacity="0.9"/>
    <circle cx="240" cy="220" r="46" fill="rgba(0,0,0,0.35)"/>
    <circle cx="355" cy="150" r="16" fill="rgba(233,238,252,0.55)"/>
  </g>

  <!-- Title -->
  <text x="110" y="560" fill="#e9eefc" font-size="96" font-weight="800" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Veo 3.1
  </text>
  <text x="110" y="632" fill="rgba(233,238,252,0.62)" font-size="34" font-weight="600" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Video generation · cinematic motion
  </text>

  <!-- Frame -->
  <rect x="44" y="44" width="1512" height="812" rx="34" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
</svg>
